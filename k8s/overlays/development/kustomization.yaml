apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pgmais

# References to base resources
bases:
- ../../base

# Development overrides
replicas:
- name: pgmais-backend
  count: 1
- name: pgmais-frontend
  count: 1

# Patch resources for development
patches:
- target:
    kind: Deployment
    name: pgmais-backend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/image
      value: python:3.11-slim
    - op: replace
      path: /spec/template/spec/containers/0/imagePullPolicy
      value: Always
    - op: replace
      path: /spec/template/spec/containers/0/env/0/value
      value: "DEBUG"

- target:
    kind: Deployment
    name: pgmais-frontend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/env/1/value
      value: "development"

commonLabels:
  environment: development

commonAnnotations:
  managed-by: kustomize
  config.kubernetes.io/version: "1.0"
