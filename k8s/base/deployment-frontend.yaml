apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgmais-frontend
  namespace: pgmais
  labels:
    app: pgmais-frontend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pgmais-frontend
  template:
    metadata:
      labels:
        app: pgmais-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: frontend
        image: node:20-alpine
        imagePullPolicy: IfNotPresent

        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: false  # Frontend precisa de /tmp durante build
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]

        ports:
        - name: http
          containerPort: 3000
          protocol: TCP

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

        env:
        - name: VITE_API_URL
          value: "https://api.pgmais.example.com"
        - name: NODE_ENV
          value: "production"

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: nodejs-cache
          mountPath: /home/node/.cache

      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 200Mi
      - name: nodejs-cache
        emptyDir:
          sizeLimit: 300Mi

      terminationGracePeriodSeconds: 20

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - pgmais-frontend
              topologyKey: kubernetes.io/hostname
