apiVersion: v1
kind: ConfigMap
metadata:
  name: pgmais-backend-config
  namespace: pgmais
data:
  # Não incluir secrets aqui. Usar Secrets do Kubernetes para:
  # - JIRA_EMAIL, JIRA_TOKEN, JIRA_BASE_URL
  # - JWT_SECRET, REFRESH_SECRET
  # - POSTGRES credenciais
  # - OPENROUTER_API_KEY
  # - GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET

  LOG_LEVEL: "INFO"
  CACHE_TTL_MINUTES: "5"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_MINUTES: "1"
  ALLOWED_ORIGINS: "https://pgmais.example.com,https://pgmais-staging.example.com"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgmais-frontend-config
  namespace: pgmais
data:
  VITE_API_BASE_PATH: "/api"
  # VITE_* variáveis são públicas no bundle JS
  # Nunca coloque secrets ou chaves sensíveis aqui!
